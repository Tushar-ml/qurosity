<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" role="img" aria-label="Qurosity">
  <!-- Q body: circle + tail ending in a dot (curiosity spark / rabbit hole) -->
  <circle
    class="mark"
    cx="58"
    cy="54"
    r="30"
    stroke-width="14"
    stroke-linecap="round"
  />
  <path
    class="mark"
    d="M78 74 L102 102"
    stroke-width="14"
    stroke-linecap="round"
  />
  <circle class="dot" cx="106" cy="106" r="7" />

  <style>
    .mark {
      stroke: #006cac;
    }
    .dot {
      fill: #006cac;
    }
    @media (prefers-color-scheme: dark) {
      .mark {
        stroke: #ff6b01;
      }
      .dot {
        fill: #ff6b01;
      }
    }
  </style>
</svg>
